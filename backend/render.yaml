services:
  - type: web
    name: supplysphere-backend
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PROJECT_NAME
        value: SupplySphere
      - key: VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
      - key: API_V1_PREFIX
        value: /api
      - key: PORT
        value: 8000
      - key: WORKERS
        value: 4
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: ALGORITHM
        value: HS256
      - key: BCRYPT_ROUNDS
        value: 12
      - key: FRONTEND_URL
        value: https://your-frontend-url.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: supplysphere-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: supplysphere-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: supplysphere-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: supplysphere-redis
          type: redis
          property: connectionString
      - key: STORAGE_TYPE
        value: local
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: MAX_UPLOAD_SIZE
        value: "10485760"
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_REQUESTS
        value: "200"
      - key: RATE_LIMIT_WINDOW
        value: "60"
      - key: CORS_ORIGINS
        value: '["https://your-frontend-url.onrender.com"]'
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false

  - type: cron
    name: celery-beat
    runtime: python
    plan: starter
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: celery -A app.tasks.celery_app beat --loglevel=info
    envVars:
      - fromService:
          name: supplysphere-backend
          type: web
          envVarKey: DATABASE_URL
      - fromService:
          name: supplysphere-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: supplysphere-backend
          type: web
          envVarKey: SECRET_KEY

databases:
  - name: supplysphere-db
    plan: starter
    region: oregon
    postgresMajorVersion: 16
    databaseName: supplysphere
    user: supplysphere

redis:
  - name: supplysphere-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
