version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supplysphere-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://supplysphere:supplysphere@postgres:5432/supplysphere
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DEBUG=false
      - FRONTEND_URL=http://localhost:5173
      - STORAGE_TYPE=local
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - supplysphere-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supplysphere-celery
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://supplysphere:supplysphere@postgres:5432/supplysphere
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DEBUG=false
    volumes:
      - uploads:/app/uploads
      - ./:/app
    depends_on:
      - backend
      - redis
    networks:
      - supplysphere-network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supplysphere-celery-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://supplysphere:supplysphere@postgres:5432/supplysphere
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
    volumes:
      - ./:/app
    depends_on:
      - celery-worker
      - redis
    networks:
      - supplysphere-network

  postgres:
    image: postgres:16-alpine
    container_name: supplysphere-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=supplysphere
      - POSTGRES_PASSWORD=supplysphere
      - POSTGRES_DB=supplysphere
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplysphere"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supplysphere-network

  redis:
    image: redis:7-alpine
    container_name: supplysphere-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - supplysphere-network

  nginx:
    image: nginx:alpine
    container_name: supplysphere-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - supplysphere-network

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  supplysphere-network:
    driver: bridge
